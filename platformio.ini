[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
lib_deps =
    h2zero/NimBLE-Arduino@^1.4.0
    bblanchon/ArduinoJson@^6.21.5
monitor_speed = 115200
upload_speed = 115200
upload_flags =
    --no-stub
build_flags =
    -DCONFIG_BT_NIMBLE_ENABLED=1
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; Upload over WiFi instead of USB: pio run -e esp32s3_ota -t upload
; Requires OTA_PASSWORD env var set to whatever you put in include/secrets.h
[env:esp32s3_ota]
extends = env:esp32s3
upload_protocol = espota
upload_port = peloton-bridge.local
upload_flags =
    --auth=${sysenv.OTA_PASSWORD}
